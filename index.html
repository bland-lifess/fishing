<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCKY PULL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
–bg:        #07080f;
–bg2:       #0d0e1a;
–panel:     #111220;
–panel2:    #171830;
–border:    #252640;
–border2:   #303060;
–gold:      #ffd700;
–gold2:     #ffaa00;
–text:      #e8e8ff;
–muted:     #5a5a88;
–common:    #b0b0c8;
–uncommon:  #3dff8a;
–rare:      #3d9dff;
–epic:      #c040ff;
–legendary: #ff9000;
–mythic:    #ff1a55;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; image-rendering:pixelated; }

html { background:#07080f; }

body {
background: #07080f;
background-image:
radial-gradient(ellipse 80% 60% at 20% 10%, rgba(20,10,60,0.85) 0%, transparent 60%),
radial-gradient(ellipse 60% 50% at 80% 90%, rgba(40,5,30,0.75) 0%, transparent 60%);
font-family: ‘Press Start 2P’, monospace;
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
user-select: none;
}

body::after {
content:’’;
position:fixed; inset:0;
background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.055) 3px, rgba(0,0,0,0.055) 4px);
pointer-events:none;
z-index:9998;
}

#stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:#fff; animation: twinkle var(–d,3s) var(–delay,0s) infinite; }
@keyframes twinkle { 0%,100%{opacity:.07} 50%{opacity:.8} }

#app {
position:relative; z-index:1;
display:flex; flex-direction:column; align-items:center;
min-height:100vh;
padding:24px 20px 80px;
max-width:860px; margin:0 auto;
}

/* HEADER */
header { text-align:center; margin-bottom:28px; }

.logo {
display:inline-block;
font-size:clamp(13px,3.5vw,26px);
color:var(–gold);
letter-spacing:5px;
text-shadow: 3px 3px 0 #b86000, 6px 6px 0 #7a3800, 0 0 40px rgba(255,200,0,.7);
animation: logo-glow 3s ease-in-out infinite;
line-height:1.4;
}
@keyframes logo-glow {
0%,100%{ text-shadow:3px 3px 0 #b86000,6px 6px 0 #7a3800,0 0 30px rgba(255,200,0,.5); }
50%{ text-shadow:3px 3px 0 #b86000,6px 6px 0 #7a3800,0 0 60px rgba(255,220,0,.9),0 0 100px rgba(255,180,0,.4); }
}

.tagline { font-size:7px; color:var(–muted); letter-spacing:3px; margin-top:10px; }

/* HUD */
.hud {
display:flex; gap:12px; align-items:stretch;
margin-bottom:20px; width:100%; max-width:560px;
}

.hud-card {
flex:1;
background: #111220;
border:2px solid #303060;
padding:12px 16px;
display:flex; align-items:center; gap:12px;
position:relative; overflow:hidden;
}
.hud-card::before {
content:’’;
position:absolute; top:0; left:0; right:0; height:1px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);
}

.hud-icon { font-size:20px; flex-shrink:0; }
.hud-label { font-size:6px; color:var(–muted); display:block; margin-bottom:6px; letter-spacing:1px; }
.hud-val { font-size:13px; color:var(–gold); text-shadow:0 0 14px var(–gold); }

.pity-mini { width:100%; height:6px; background:#0d0e1a; border:1px solid #252640; margin-top:8px; overflow:hidden; }
.pity-mini-fill { height:100%; background:linear-gradient(90deg,var(–epic),var(–legendary)); transition:width .4s ease; }

/* STAGE */
.stage {
display:flex; flex-direction:column; align-items:center;
background: #111220;
border:2px solid #303060;
padding:28px 24px 22px;
width:100%; max-width:560px;
position:relative; margin-bottom:16px;
overflow:hidden;
}
.stage::before {
content:’’;
position:absolute; top:0; left:0; right:0; height:2px;
background:linear-gradient(90deg,transparent,var(–gold),transparent);
animation:shimmer-bar 4s ease-in-out infinite;
}
@keyframes shimmer-bar { 0%,100%{opacity:.3} 50%{opacity:1} }

.stage-label {
position:absolute; top:-1px; left:50%; transform:translateX(-50%);
background:#111220; border:2px solid #303060; border-top:none;
padding:3px 16px;
font-size:6px; color:var(–muted); letter-spacing:2px; white-space:nowrap;
}

/* BLOCK */
#block-wrap {
position:relative; margin-bottom:22px; cursor:pointer;
}
#lucky-block {
width:128px; height:128px; display:block;
filter:drop-shadow(0 0 18px rgba(255,210,0,.5));
transition:filter .15s, transform .1s;
}
#block-wrap:hover #lucky-block { filter:drop-shadow(0 0 36px rgba(255,220,0,.9)); transform:scale(1.07); }
#block-wrap:active #lucky-block { transform:scale(.92); }

.block-hint {
text-align:center; font-size:6px; color:var(–muted);
letter-spacing:2px; margin-top:8px;
animation:hint-blink 2s ease-in-out infinite;
}
@keyframes hint-blink { 0%,100%{opacity:.35} 50%{opacity:.85} }

@keyframes block-shake {
0%,100%{transform:translate(0,0) rotate(0)}
12%{transform:translate(-5px,-5px) rotate(-3deg)}
25%{transform:translate(5px,-5px) rotate(3deg)}
37%{transform:translate(-5px,5px) rotate(-3deg)}
50%{transform:translate(5px,5px) rotate(3deg)}
62%{transform:translate(-7px,0) rotate(-4deg)}
75%{transform:translate(7px,0) rotate(4deg)}
87%{transform:translate(-3px,3px) rotate(-2deg)}
}
.shaking { animation:block-shake .55s ease-in-out !important; }

/* BUTTONS */
.btn-row {
display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%;
}

.pull-btn {
font-family:‘Press Start 2P’,monospace; font-size:8px;
padding:13px 18px; cursor:pointer; border:0; color:#fff;
position:relative; overflow:hidden;
transition:transform .08s, filter .08s;
min-width:114px; text-align:center;
}
.pull-btn::after {
content:’’; position:absolute; inset:0;
background:linear-gradient(180deg,rgba(255,255,255,.13) 0%,transparent 55%);
pointer-events:none;
}
.pull-btn:hover { transform:scale(1.07) translateY(-3px); filter:brightness(1.18); }
.pull-btn:active { transform:scale(.95); }

.btn-x1   { background:linear-gradient(180deg,#f5c800,#c89000); box-shadow:0 5px 0 #7a5800,0 0 22px rgba(255,200,0,.3); color:#1a0e00; }
.btn-x10  { background:linear-gradient(180deg,#3a9bff,#1866cc); box-shadow:0 5px 0 #0a3a80,0 0 22px rgba(60,150,255,.3); }
.btn-x100 { background:linear-gradient(180deg,#c040ff,#8000cc); box-shadow:0 5px 0 #440077,0 0 22px rgba(180,50,255,.3); }

.btn-label { display:block; font-size:9px; margin-bottom:6px; }
.btn-cost  { display:block; font-size:6px; opacity:.72; }

/* RESULT */
#result-area {
width:100%; max-width:560px;
min-height:240px;
display:flex; align-items:center; justify-content:center;
}

#single-result { display:none; flex-direction:column; align-items:center; gap:14px; }

.reveal-card {
width:175px; height:226px;
border:3px solid #333; position:relative;
animation:card-pop .45s cubic-bezier(.34,1.56,.64,1); overflow:hidden;
}
.reveal-card canvas { width:100%; height:100%; display:block; }

@keyframes card-pop {
from{transform:scale(.05) rotate(-15deg);opacity:0}
to{transform:scale(1) rotate(0);opacity:1}
}

.item-name { font-size:10px; text-align:center; max-width:280px; line-height:1.7; }
.item-desc  { font-size:7px; color:var(–muted); text-align:center; max-width:260px; line-height:1.6; margin-top:-6px; }

#multi-result {
display:none; flex-wrap:wrap; gap:7px;
justify-content:center; align-content:flex-start;
width:100%; max-width:560px;
}

.mini-card {
width:70px; height:88px;
border:3px solid #333; position:relative; cursor:pointer; overflow:hidden;
transition:transform .1s;
animation:card-pop .3s cubic-bezier(.34,1.56,.64,1) both;
}
.mini-card:hover { transform:scale(1.18) translateY(-4px); z-index:20; }
.mini-card canvas { width:100%; height:100%; display:block; }

.r-common    { border-color:var(–common);    box-shadow:0 0 8px var(–common); }
.r-uncommon  { border-color:var(–uncommon);  box-shadow:0 0 11px var(–uncommon); }
.r-rare      { border-color:var(–rare);      box-shadow:0 0 14px var(–rare); }
.r-epic      { border-color:var(–epic);      box-shadow:0 0 18px var(–epic); }
.r-legendary { border-color:var(–legendary); box-shadow:0 0 22px var(–legendary); animation:leg-pulse 1.6s ease-in-out infinite; }
.r-mythic    { border-color:var(–mythic);    box-shadow:0 0 30px var(–mythic); animation:myth-pulse .9s ease-in-out infinite; }

@keyframes leg-pulse  { 0%,100%{box-shadow:0 0 18px var(–legendary)} 50%{box-shadow:0 0 40px var(–legendary),0 0 70px rgba(255,144,0,.4)} }
@keyframes myth-pulse { 0%,100%{box-shadow:0 0 28px var(–mythic)}    50%{box-shadow:0 0 60px var(–mythic),0 0 110px rgba(255,26,85,.5)} }

/* STATS */
.stats-strip {
display:flex; flex-wrap:wrap; justify-content:center;
width:100%; max-width:560px; margin-top:16px;
border:2px solid #303060;
background:#111220; overflow:hidden;
}
.stat-cell {
flex:1; min-width:88px;
display:flex; flex-direction:column; align-items:center;
padding:12px 8px; border-right:2px solid #252640; position:relative;
}
.stat-cell:last-child { border-right:none; }
.stat-cell::before { content:’’; position:absolute; top:0; left:0; right:0; height:2px; }
.s-total::before  { background:var(–muted); }
.s-mythic::before { background:var(–mythic); }
.s-leg::before    { background:var(–legendary); }
.s-epic::before   { background:var(–epic); }
.s-best::before   { background:var(–gold); }
.stat-lbl { font-size:5px; color:var(–muted); letter-spacing:1px; margin-bottom:8px; white-space:nowrap; }
.stat-num { font-size:13px; }
.s-total .stat-num  { color:var(–text); }
.s-mythic .stat-num { color:var(–mythic); text-shadow:0 0 10px var(–mythic); }
.s-leg .stat-num    { color:var(–legendary); text-shadow:0 0 10px var(–legendary); }
.s-epic .stat-num   { color:var(–epic); text-shadow:0 0 10px var(–epic); }
.s-best .stat-num   { font-size:7px; }

/* COLLECTION */
.coll-toggle {
font-family:‘Press Start 2P’,monospace; font-size:7px; letter-spacing:1px;
background:none; border:2px solid #252640; color:var(–muted);
padding:10px 18px; cursor:pointer; margin-top:20px;
transition:color .2s, border-color .2s; width:100%; max-width:560px;
}
.coll-toggle:hover { color:var(–text); border-color:#303060; }

#collection-area {
display:none; width:100%; max-width:560px;
background:#111220; border:2px solid #303060; border-top:none; padding:14px;
}
.coll-grid { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
.coll-item {
width:54px; height:68px; border:2px solid #333; position:relative; overflow:hidden; transition:transform .1s;
}
.coll-item:hover { transform:scale(1.14); z-index:5; }
.coll-item canvas { width:100%; height:100%; display:block; }
.coll-count { position:absolute; bottom:0; right:0; background:rgba(0,0,0,.85); font-size:5px; padding:1px 3px; color:var(–gold); }

/* TOOLTIP */
#tooltip {
position:fixed; pointer-events:none; z-index:9000;
background:#171830; border:2px solid #303060;
padding:12px 14px; font-size:7px; color:var(–text);
line-height:1.9; max-width:192px; display:none;
box-shadow:0 4px 24px rgba(0,0,0,.85);
}
#tt-name   { font-size:8px; margin-bottom:6px; }
#tt-rarity { font-size:7px; margin-bottom:5px; }
#tt-desc   { color:var(–muted); font-size:6px; }

/* OVERLAYS */
#particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:100; }
#flash { position:fixed; inset:0; pointer-events:none; z-index:200; opacity:0; }

#rarity-banner {
position:fixed; top:28%; left:50%;
transform:translateX(-50%) scaleY(0);
z-index:600; font-size:clamp(11px,4.5vw,20px);
letter-spacing:7px; text-align:center;
text-shadow:0 0 30px currentColor;
white-space:nowrap;
background:rgba(5,5,15,.8);
border-top:2px solid currentColor;
border-bottom:2px solid currentColor;
padding:14px 30px;
transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
#rarity-banner.show { transform:translateX(-50%) scaleY(1); }

@media(max-width:480px){
.pull-btn{font-size:7px;padding:11px 12px;min-width:90px}
#lucky-block{width:100px;height:100px}
.stat-cell{min-width:68px;padding:10px 5px}
}
</style>

</head>
<body>

<canvas id="particle-canvas"></canvas>

<div id="flash"></div>
<div id="rarity-banner"></div>
<div id="stars"></div>

<div id="tooltip">
  <div id="tt-name"></div>
  <div id="tt-rarity"></div>
  <div id="tt-desc"></div>
</div>

<div id="app">
  <header>
    <div class="logo">★ LUCKY PULL ★</div>
    <div class="tagline">OPEN · COLLECT · ASCEND</div>
  </header>

  <div class="hud">
    <div class="hud-card">
      <span class="hud-icon">💎</span>
      <div>
        <span class="hud-label">GEMS</span>
        <span class="hud-val" id="coin-display">1000</span>
      </div>
    </div>
    <div class="hud-card">
      <span class="hud-icon">⚡</span>
      <div style="flex:1">
        <span class="hud-label">LEGENDARY PITY &nbsp;<span id="pity-count" style="color:#cc88ff">0</span>/80</span>
        <div class="pity-mini"><div class="pity-mini-fill" id="pity-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="stage-label">LUCKY BLOCK</div>
    <div id="block-wrap" onclick="openBlock()">
      <canvas id="lucky-block" width="128" height="128"></canvas>
      <div class="block-hint">CLICK TO INSPECT</div>
    </div>
    <div class="btn-row">
      <button class="pull-btn btn-x1"  onclick="doPull(1)">
        <span class="btn-label">× 1 PULL</span><span class="btn-cost">10 💎</span>
      </button>
      <button class="pull-btn btn-x10" onclick="doPull(10)">
        <span class="btn-label">× 10 PULL</span><span class="btn-cost">90 💎</span>
      </button>
      <button class="pull-btn btn-x100" onclick="doPull(100)">
        <span class="btn-label">× 100 PULL</span><span class="btn-cost">800 💎</span>
      </button>
    </div>
  </div>

  <div id="result-area">
    <div id="single-result">
      <div class="reveal-card" id="main-card">
        <canvas id="card-canvas" width="175" height="226"></canvas>
      </div>
      <div class="item-name" id="item-name-display"></div>
      <div class="item-desc"  id="item-desc-display"></div>
    </div>
    <div id="multi-result"></div>
  </div>

  <div class="stats-strip">
    <div class="stat-cell s-total">
      <div class="stat-lbl">TOTAL</div><div class="stat-num" id="stat-total">0</div>
    </div>
    <div class="stat-cell s-mythic">
      <div class="stat-lbl">MYTHIC</div><div class="stat-num" id="stat-mythic">0</div>
    </div>
    <div class="stat-cell s-leg">
      <div class="stat-lbl">LEGEND</div><div class="stat-num" id="stat-legendary">0</div>
    </div>
    <div class="stat-cell s-epic">
      <div class="stat-lbl">EPIC</div><div class="stat-num" id="stat-epic">0</div>
    </div>
    <div class="stat-cell s-best">
      <div class="stat-lbl">BEST PULL</div><div class="stat-num" id="stat-best">—</div>
    </div>
  </div>

<button class="coll-toggle" onclick="toggleColl()">▶ COLLECTION LOG</button>

  <div id="collection-area">
    <div class="coll-grid" id="coll-grid"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  RARITIES & ITEMS
// ═══════════════════════════════════════════════
const RARITIES = {
  common:    { label:'COMMON',    color:'#b0b0c8', chance:.58  },
  uncommon:  { label:'UNCOMMON',  color:'#3dff8a', chance:.25  },
  rare:      { label:'RARE',      color:'#3d9dff', chance:.10  },
  epic:      { label:'EPIC',      color:'#c040ff', chance:.05  },
  legendary: { label:'LEGENDARY', color:'#ff9000', chance:.018 },
  mythic:    { label:'MYTHIC',    color:'#ff1a55', chance:.002 },
};
const R_ORDER = ['common','uncommon','rare','epic','legendary','mythic'];

// ═══════════════════════════════════════════════
//  16×16 PIXEL ART SPRITES
// ═══════════════════════════════════════════════
// Each drawXxx(px) receives px(x,y,color), draws on a 16×16 grid

function drawSword(px){
  // Blade
  const bl='#d0d8e8',bm='#9898b8',hi='#ffffff',sh='#484868';
  const gd='#e0b820',gdh='#ffdd50',gdd='#906010';
  const hm='#8a4818',hh='#c07838',hd='#3a2008';
  [[7,0,hi],[8,0,bl],[7,1,hi],[8,1,bl],[7,2,hi],[8,2,bl],
   [6,3,bl],[7,3,hi],[8,3,bm],[9,3,sh],[6,4,bl],[7,4,hi],[8,4,bm],[9,4,sh],
   [5,5,bl],[6,5,bl],[7,5,hi],[8,5,bm],[9,5,sh],[10,5,sh],
   [5,6,bl],[6,6,bl],[7,6,hi],[8,6,bm],[9,6,sh],[10,6,sh],
   [4,7,bl],[5,7,bl],[6,7,bl],[7,7,hi],[8,7,bm],[9,7,sh],[10,7,sh],[11,7,sh],
   // Crossguard
   [2,8,gdh],[3,8,gd],[4,8,gd],[5,8,gd],[6,8,gd],[7,8,gdh],[8,8,gd],[9,8,gd],[10,8,gdd],[11,8,gdd],[12,8,gdd],[13,8,gdd],
   [2,9,gdd],[3,9,gd],[4,9,gd],[5,9,gd],[6,9,gd],[7,9,gd],[8,9,gdd],[9,9,gdd],[10,9,gdd],[11,9,gdd],[12,9,gdd],
   // Handle
   [7,10,hh],[8,10,hm],[7,11,hm],[8,11,hd],[7,12,hh],[8,12,hm],
   [7,13,hm],[8,13,hd],[7,14,hh],[8,14,hm],
   // Pommel
   [5,15,gd],[6,15,gdh],[7,15,gd],[8,15,gdh],[9,15,gd],[10,15,gdd],
  ].forEach(([x,y,c])=>px(x,y,c));
}

function drawShield(px){
  const fr='#2255cc',fl='#4488ff',fs='#0a2888',hi='#77aaff',rh='#ff4444',rm='#cc1111';
  const bd='#7a5020',bm='#b07840',bh='#d8aa60';
  [[4,0,fr],[5,0,fr],[6,0,fr],[7,0,fr],[8,0,fr],[9,0,fr],[10,0,fr],[11,0,fr],
   [3,1,fr],[4,1,hi],[5,1,fl],[6,1,fl],[7,1,fl],[8,1,fl],[9,1,fl],[10,1,fr],[11,1,fr],[12,1,fr],
   [3,2,fr],[4,2,fl],[5,2,fl],[6,2,hi],[7,2,fl],[8,2,fl],[9,2,fl],[10,2,fr],[11,2,fr],[12,2,fr],
   [3,3,fr],[4,3,fl],[5,3,fl],[6,3,fl],[7,3,fl],[8,3,fl],[9,3,fl],[10,3,fs],[11,3,fs],[12,3,fr],
   [3,4,fr],[4,4,fl],[5,4,fl],[6,4,fl],[7,4,fl],[8,4,fl],[9,4,fs],[10,4,fs],[11,4,fr],
   [3,5,fr],[4,5,fs],[5,5,fl],[6,5,fl],[7,5,fl],[8,5,fs],[9,5,fs],[10,5,fr],
   [4,6,fr],[5,6,fs],[6,6,fl],[7,6,fl],[8,6,fs],[9,6,fr],
   [4,7,fr],[5,7,fr],[6,7,fr],[7,7,fr],[8,7,fr],[9,7,fr],
   [5,8,fr],[6,8,fr],[7,8,fr],[8,8,fr],
   [6,9,fr],[7,9,fr],
   // Red cross on shield
   [6,2,rh],[7,2,rh],[8,2,rh],[7,3,rh],[7,4,rm],
   // Boss
   [7,5,'#fff'],[8,5,'#eee'],
  ].forEach(([x,y,c])=>px(x,y,c));
}

function drawPotion(px){
  const co='#888',cs='#aaa',cl='#ccc';
  const rm='#ee2222',rh='#ff8888',rd='#aa0000',rw='#ffffff';
  const bo='#441100';
  [[7,0,cs],[8,0,cs],[7,1,cl],[8,1,cl],[6,2,co],[7,2,cs],[8,2,cs],[9,2,co],
   [6,3,rh],[7,3,rw],[8,3,rm],[9,3,rm],
   [6,4,rm],[7,4,rw],[8,4,rm],[9,4,rd],
   [4,5,rm],[5,5,rh],[6,5,rw],[7,5,rw],[8,5,rh],[9,5,rm],[10,5,rm],[11,5,rd],
   [3,6,rm],[4,6,rh],[5,6,rw],[6,6,rw],[7,6,rw],[8,6,rh],[9,6,rm],[10,6,rd],[11,6,rd],

function renderSprite(ctx, W, H, sprFn) {
  const S = Math.floor(Math.min(W, H) / 16);
  const ox = Math.floor((W - S * 16) / 2);
  const oy = Math.floor((H - S * 16) / 2);
  function px(x, y, c) { ctx.fillStyle = c; ctx.fillRect(ox + x*S, oy + y*S, S, S); }
  sprFn(px);
}

let _actx;
function actx(){ if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)(); return _actx; }
function tone(f,d,type='square',vol=.12,delay=0){
  try{
    const c=actx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=type;
    o.frequency.setValueAtTime(f,c.currentTime+delay);
    g.gain.setValueAtTime(0,c.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+.01);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+delay+d);
    o.start(c.currentTime+delay);o.stop(c.currentTime+delay+d+.05);
  }catch(e){}
}
function sfxReveal(r){
  const m={
    common:  [[200,.08],[300,.08]],
    uncommon:[[300,.08],[400,.1],[500,.1]],
    rare:    [[400,.08],[500,.1],[660,.15],[880,.12]],
    epic:    [[330,.07],[440,.09],[550,.1],[770,.16],[1000,.14]],
    legendary:[[440,.08],[550,.1],[660,.1],[880,.16],[1100,.2],[1320,.25,,'sine']],
    mythic:  [[220,.07],[330,.07],[440,.07],[660,.1],[880,.12],[1100,.16],[1320,.2],[1760,.35,,'sine']],
  };
  let t=0;(m[r]||m.common).forEach(([f,d,v,tp])=>{tone(f,d,tp||'square',v||.12,t);t+=d*.85;});
}
function sfxClick(){ tone(440,.05,'square',.08); }
function sfxOpen(){ [180,260,380,500,640].forEach((f,i)=>tone(f,.09,'square',.1,i*.04)); }

function rollRarity(pity){
  if(pity>=80) return 'legendary';
  let r=Math.random();
  if(r<.002) return 'mythic'; r-=.002;
  const lb=pity>60?(pity-60)*.02:0;
  if(r<.018+lb) return 'legendary'; r-=.018+lb;
  if(r<.05) return 'epic'; r-=.05;
  if(r<.10) return 'rare'; r-=.10;
  if(r<.25) return 'uncommon';
  return 'common';
}
function pickItem(r){ const pool=ITEMS.filter(i=>i.rarity===r); return pool[Math.floor(Math.random()*pool.length)]; }

function doPull(n){
  if(pulling) return;
  const cost={1:10,10:90,100:800}[n];
  if(gems<cost){ sfxError(); doFlash('#ff3333',.45); return; }
  gems-=cost; updateGems(); pulling=true; sfxClick();
  const bw=document.getElementById('block-wrap');
  bw.classList.remove('shaking'); void bw.offsetWidth; bw.classList.add('shaking');
  sfxOpen();
  setTimeout(()=>{ n===1?doSingle():doMulti(n); }, 560);
}

function doSingle(){
  pityCount++;
  const r=rollRarity(pityCount);
  if(r==='legendary'||r==='mythic') pityCount=0;
  const item=pickItem(r);
  recordStats(r); updatePity(); addToColl(item);
  showSingle(item);
}

function doMulti(n){
  const results=[];
  for(let i=0;i<n;i++){
    pityCount++;
    const r=rollRarity(pityCount);
    if(r==='legendary'||r==='mythic') pityCount=0;
    const item=pickItem(r);
    results.push(item); recordStats(r); addToColl(item);
  }
  updatePity(); showMulti(results);
}

function drawCard(canvas,item,W,H){
  const ctx=canvas.getContext('2d');
  const rc=RARITIES[item.rarity];

  // Solid dark background
  ctx.fillStyle='#0d0e1a'; ctx.fillRect(0,0,W,H);

  // Subtle rarity tint
  ctx.fillStyle=rc.color+'14'; ctx.fillRect(0,0,W,H);

  // Top color stripe
  ctx.fillStyle=rc.color; ctx.fillRect(0,0,W,3);

  // Pixel corner accents
  ctx.fillStyle=rc.color;
  [[0,0,4,1],[0,0,1,4],[W-4,0,4,1],[W-1,0,1,4],
   [0,H-1,4,1],[0,H-4,1,4],[W-4,H-1,4,1],[W-1,H-4,1,4]
  ].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));

  // Sprite area
  const margin=Math.max(6,Math.floor(W*.07));
  const sprW=W-margin*2;
  const sprH=Math.floor(H*.58);
  const sprY=Math.floor(H*.05);

  const tmp=document.createElement('canvas');
  tmp.width=sprW; tmp.height=sprH;
  renderSprite(tmp.getContext('2d'), sprW, sprH, item.spr);
  ctx.drawImage(tmp, margin, sprY);

  // Separator
  ctx.fillStyle=rc.color+'55'; ctx.fillRect(4,Math.floor(H*.69),W-8,1);

  // Rarity badge
  ctx.fillStyle=rc.color+'22'; ctx.fillRect(4,Math.floor(H*.72),W-8,Math.floor(H*.13));
  ctx.fillStyle=rc.color;
  ctx.font=`${Math.max(5,Math.floor(W/23))}px 'Press Start 2P',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(rc.label, W/2, Math.floor(H*.785));

  // Item name
  ctx.fillStyle='#e0e0f8';
  const fs=Math.max(4,Math.floor(W/27));
  ctx.font=`${fs}px 'Press Start 2P',monospace`;
  const words=item.name.split(' ');
  let lines=[],line='';
  words.forEach(w=>{ const t=line?line+' '+w:w; if(ctx.measureText(t).width>W-10&&line){lines.push(line);line=w;}else line=t; });
  lines.push(line);
  const lh=fs*1.8, startY=Math.floor(H*.9)-(lines.length-1)*lh*.5;
  lines.forEach((l,i)=>ctx.fillText(l,W/2,startY+i*lh));
}

const PC=document.getElementById('particle-canvas'), PX=PC.getContext('2d');

const PCOLS={
  common:   ['#b0b0cc','#ccccee','#ffffff'],
  uncommon: ['#3dff8a','#88ffaa','#aaffcc','#ffffff'],
  rare:     ['#3d9dff','#88aaff','#aaccff','#ffffff'],
  epic:     ['#c040ff','#e080ff','#ff80ff','#ffffff'],
  legendary:['#ff9000','#ffaa44','#ffd700','#ffee88','#ffffff'],
  mythic:   ['#ff1a55','#ff44aa','#ff00cc','#ff8800','#ffcc00','#88ffff','#ffffff'],
};

function spawnParticles(rarity,cx,cy,n=null){
  const counts={common:18,uncommon:32,rare:46,epic:62,legendary:95,mythic:145};
  const count=n||counts[rarity]||20;
  const cols=PCOLS[rarity];
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*9, sz=2+Math.random()*7;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-Math.random()*3,size:sz,
      color:cols[Math.floor(Math.random()*cols.length)],life:1,decay:.01+Math.random()*.018,gravity:.18,
      type:Math.random()<.35?'star':'square',rot:Math.random()*Math.PI*2,rotv:(Math.random()-.5)*.2});
  }
}
function drawStar5(ctx,cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a1=(i*2*Math.PI/5)-Math.PI/2,a2=a1+Math.PI/5;
    const x1=cx+Math.cos(a1)*r,y1=cy+Math.sin(a1)*r,x2=cx+Math.cos(a2)*(r*.42),y2=cy+Math.sin(a2)*(r*.42);
    i===0?ctx.moveTo(x1,y1):ctx.lineTo(x1,y1); ctx.lineTo(x2,y2);
  }
  ctx.closePath(); ctx.fill();
}
function tickParticles(){
  PX.clearRect(0,0,PC.width,PC.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=.985; p.life-=p.decay; p.rot+=p.rotv;
    PX.globalAlpha=Math.max(0,p.life); PX.fillStyle=p.color;
    PX.save(); PX.translate(p.x,p.y); PX.rotate(p.rot);
    if(p.type==='star') drawStar5(PX,0,0,p.size);
    else PX.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    PX.restore();
  });
  PX.globalAlpha=1; requestAnimationFrame(tickParticles);
}
tickParticles();

function doShake(mag=10,dur=400){
  const el=document.getElementById('app'); const t0=Date.now();
  (function go(){ const e=Date.now()-t0; if(e>dur){el.style.transform='';return;}
    const m=mag*(1-e/dur),x=(Math.random()-.5)*m,y=(Math.random()-.5)*m;
    el.style.transform=`translate(${x}px,${y}px)`; requestAnimationFrame(go);
  })();
}
function showBanner(r){
  const bn=document.getElementById('rarity-banner'), rc=RARITIES[r];
  bn.textContent=`✦ ${rc.label} ✦`;
  bn.style.color=rc.color; bn.style.borderColor=rc.color;
  bn.style.textShadow=`0 0 30px ${rc.color},0 0 60px ${rc.color}`;
  bn.classList.add('show'); setTimeout(()=>bn.classList.remove('show'),2400);
}

// BLOCK ANIMATION
let blockPulse=0, blockDir=1;
function drawLuckyBlock(canvas, pulse){
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height;
  const S=Math.floor(W/12);
  ctx.clearRect(0,0,W,H);
  // Radial glow behind block
  const glow=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.65);
  glow.addColorStop(0,`rgba(255,210,0,${.1+pulse*.18})`);
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

  function p(x,y,c){ ctx.fillStyle=c; ctx.fillRect(x*S,y*S,S,S); }
  const gh='#ffee80',gm='#ffd700',gd='#c89000',gx='#9a6800';
  // Block body
  for(let x=1;x<=10;x++) for(let y=1;y<=10;y++) p(x,y,gm);
  for(let x=1;x<=10;x++) p(x,1,gh);
  for(let y=1;y<=10;y++) p(1,y,gh);
  p(1,1,'#fff8aa');
  for(let x=1;x<=10;x++) p(x,10,gx);
  for(let y=1;y<=10;y++) p(10,y,gd);
  p(10,10,'#886600');
  // ? mark
  [[4,2,'#000'],[5,2,'#000'],[6,2,'#000'],[7,2,'#000'],
   [3,3,'#000'],[8,3,'#000'],[7,4,'#000'],[6,5,'#000'],[6,6,'#000'],
   [6,8,'#000'],[6,9,'#000']
  ].forEach(([x,y,c])=>p(x,y,c));
  // Pulse shimmer
  if(pulse>0){ ctx.fillStyle=`rgba(255,255,255,${pulse*.16})`; ctx.fillRect(0,0,W,H); }
  // Black border
  ctx.fillStyle='#000';
  [0,11].forEach(bx=>{ for(let y=0;y<=11;y++) ctx.fillRect(bx*S,y*S,S,S); });
  [0,11].forEach(by=>{ for(let x=1;x<=10;x++) ctx.fillRect(x*S,by*S,S,S); });
}
function tickBlock(){
  blockPulse+=blockDir*.007; if(blockPulse>1) blockDir=-1; if(blockPulse<0){blockDir=1;blockPulse=0;}
  const c=document.getElementById('lucky-block'); if(c) drawLuckyBlock(c,blockPulse);
  requestAnimationFrame(tickBlock);
}
tickBlock();

function openBlock(){
  if(pulling) return; sfxClick();
  const w=document.getElementById('block-wrap');
  w.classList.remove('shaking'); void w.offsetWidth; w.classList.add('shaking');
}

// STARS
(function(){
  const cont=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()<.08?3:Math.random()<.25?2:1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*5}s;animation-delay:${Math.random()*5}s`;
    cont.appendChild(s);
  }
})();

// GEM REGEN
setInterval(()=>{ gems=Math.min(gems+5,9999); updateGems(); }, 3000);

// INIT
updateGems(); updatePity();
