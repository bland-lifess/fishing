<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCKY PULL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
–bg: #0a0a12;
–panel: #12121e;
–border: #2a2a3e;
–gold: #ffd700;
–common: #aaaaaa;
–uncommon: #44ff88;
–rare: #4488ff;
–epic: #cc44ff;
–legendary: #ff8800;
–mythic: #ff2255;
}

- { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

body {
background: var(–bg);
font-family: ‘Press Start 2P’, monospace;
color: #fff;
min-height: 100vh;
overflow-x: hidden;
overflow-y: auto;
user-select: none;
}

/* Scanline overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0,0,0,0.08) 2px,
rgba(0,0,0,0.08) 4px
);
pointer-events: none;
z-index: 9999;
}

/* Stars bg */
#stars {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 0;
}

.star {
position: absolute;
background: #fff;
animation: twinkle var(–d) infinite;
}

@keyframes twinkle {
0%,100% { opacity: 0.1; }
50% { opacity: 0.9; }
}

#app {
position: relative;
z-index: 1;
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
padding: 20px 20px 60px;
}

/* HEADER */
header {
text-align: center;
margin-bottom: 30px;
margin-top: 10px;
}

.title-pixel {
font-size: clamp(14px, 4vw, 28px);
color: var(–gold);
text-shadow:
4px 4px 0 #ff6600,
8px 8px 0 #cc3300,
0 0 30px rgba(255,215,0,0.8);
animation: title-pulse 2s ease-in-out infinite;
letter-spacing: 4px;
}

@keyframes title-pulse {
0%,100% { filter: brightness(1); }
50% { filter: brightness(1.3); }
}

.subtitle {
font-size: 8px;
color: #666;
margin-top: 10px;
letter-spacing: 2px;
}

/* CURRENCY */
.currency-bar {
display: flex;
gap: 16px;
align-items: center;
background: var(–panel);
border: 2px solid var(–border);
padding: 10px 20px;
margin-bottom: 24px;
position: relative;
}

.currency-bar::before, .currency-bar::after {
content: ‘★’;
position: absolute;
font-size: 14px;
color: var(–gold);
top: 50%;
transform: translateY(-50%);
}
.currency-bar::before { left: -20px; }
.currency-bar::after { right: -20px; }

.gem-icon { font-size: 16px; }

#coin-display {
font-size: 10px;
color: var(–gold);
text-shadow: 0 0 10px var(–gold);
min-width: 80px;
}

/* BLOCK AREA */
#block-area {
position: relative;
margin-bottom: 28px;
}

#lucky-block {
width: 120px;
height: 120px;
cursor: pointer;
position: relative;
transition: transform 0.1s;
filter: drop-shadow(0 0 16px rgba(255,215,0,0.5));
}

#lucky-block:hover {
filter: drop-shadow(0 0 28px rgba(255,215,0,0.9));
transform: scale(1.05);
}

#lucky-block:active { transform: scale(0.95); }

#lucky-block canvas {
width: 120px;
height: 120px;
display: block;
}

/* shake animation */
@keyframes shake {
0%,100% { transform: translate(0,0) rotate(0deg); }
10% { transform: translate(-4px,-4px) rotate(-2deg); }
20% { transform: translate(4px,-4px) rotate(2deg); }
30% { transform: translate(-4px,4px) rotate(-2deg); }
40% { transform: translate(4px,4px) rotate(2deg); }
50% { transform: translate(-6px,0) rotate(-3deg); }
60% { transform: translate(6px,0) rotate(3deg); }
70% { transform: translate(-4px,-4px) rotate(-2deg); }
80% { transform: translate(4px,4px) rotate(2deg); }
90% { transform: translate(-2px,2px) rotate(-1deg); }
}

.shaking { animation: shake 0.5s ease-in-out; }

/* PULL BUTTONS */
.btn-row {
display: flex;
gap: 12px;
flex-wrap: wrap;
justify-content: center;
margin-bottom: 28px;
}

.pull-btn {
font-family: ‘Press Start 2P’, monospace;
font-size: 9px;
padding: 14px 20px;
cursor: pointer;
border: 0;
position: relative;
color: #000;
letter-spacing: 1px;
transition: transform 0.08s, filter 0.08s;
clip-path: polygon(4px 0%, calc(100% - 4px) 0%, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px);
}

.pull-btn:hover {
transform: scale(1.06) translateY(-2px);
filter: brightness(1.2);
}

.pull-btn:active { transform: scale(0.96); }

.btn-x1 { background: var(–gold); box-shadow: 0 4px 0 #996600, 0 0 20px rgba(255,215,0,0.4); }
.btn-x10 { background: var(–rare); box-shadow: 0 4px 0 #224499, 0 0 20px rgba(68,136,255,0.4); color: #fff; }
.btn-x100 { background: var(–epic); box-shadow: 0 4px 0 #660099, 0 0 20px rgba(204,68,255,0.4); color: #fff; }

.btn-cost {
font-size: 7px;
display: block;
margin-top: 5px;
opacity: 0.8;
}

/* RESULT DISPLAY */
#result-area {
width: 100%;
max-width: 700px;
min-height: 200px;
position: relative;
}

/* Single pull reveal */
#single-result {
display: none;
flex-direction: column;
align-items: center;
gap: 16px;
}

.reveal-card {
width: 160px;
height: 200px;
border: 4px solid #333;
position: relative;
cursor: default;
animation: card-appear 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes card-appear {
from { transform: scale(0) rotate(-10deg); opacity: 0; }
to { transform: scale(1) rotate(0deg); opacity: 1; }
}

.reveal-card canvas {
width: 100%;
height: 100%;
display: block;
}

.item-name {
font-size: 9px;
text-align: center;
max-width: 300px;
line-height: 1.6;
margin-top: 4px;
}

/* Multi pull grid */
#multi-result {
display: none;
flex-wrap: wrap;
gap: 8px;
justify-content: center;
}

.mini-card {
width: 64px;
height: 80px;
border: 3px solid #333;
position: relative;
cursor: pointer;
transition: transform 0.1s;
animation: card-appear 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

.mini-card:hover { transform: scale(1.15); z-index: 10; }
.mini-card canvas { width: 100%; height: 100%; display: block; }

/* RARITY glow borders */
.rarity-common { border-color: var(–common); box-shadow: 0 0 8px var(–common); }
.rarity-uncommon { border-color: var(–uncommon); box-shadow: 0 0 10px var(–uncommon); }
.rarity-rare { border-color: var(–rare); box-shadow: 0 0 12px var(–rare); }
.rarity-epic { border-color: var(–epic); box-shadow: 0 0 16px var(–epic); }
.rarity-legendary { border-color: var(–legendary); box-shadow: 0 0 20px var(–legendary); animation: legendary-pulse 1.5s ease-in-out infinite; }
.rarity-mythic { border-color: var(–mythic); box-shadow: 0 0 28px var(–mythic); animation: mythic-pulse 0.8s ease-in-out infinite; }

@keyframes legendary-pulse {
0%,100% { box-shadow: 0 0 20px var(–legendary); }
50% { box-shadow: 0 0 40px var(–legendary), 0 0 60px var(–legendary); }
}

@keyframes mythic-pulse {
0%,100% { box-shadow: 0 0 28px var(–mythic); }
50% { box-shadow: 0 0 60px var(–mythic), 0 0 100px var(–mythic), inset 0 0 20px rgba(255,34,85,0.3); }
}

/* PARTICLE CANVAS */
#particle-canvas {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 100;
}

/* FLASH OVERLAY */
#flash {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 200;
opacity: 0;
transition: opacity 0.05s;
}

/* STATS BAR */
#stats-bar {
margin-top: 32px;
display: flex;
gap: 24px;
flex-wrap: wrap;
justify-content: center;
font-size: 7px;
color: #555;
}

.stat-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.stat-label { color: #444; }
.stat-val { font-size: 9px; }
.stat-val.mythic { color: var(–mythic); }
.stat-val.legendary { color: var(–legendary); }
.stat-val.epic { color: var(–epic); }

/* PITY METER */
#pity-area {
margin-top: 20px;
text-align: center;
font-size: 7px;
color: #555;
}

.pity-bar-outer {
width: 200px;
height: 12px;
background: #1a1a2a;
border: 2px solid #333;
margin: 8px auto 0;
position: relative;
overflow: hidden;
}

.pity-bar-inner {
height: 100%;
background: linear-gradient(90deg, var(–epic), var(–legendary));
transition: width 0.4s ease;
position: relative;
}

.pity-bar-inner::after {
content: ‘’;
position: absolute;
right: 0;
top: 0;
width: 4px;
height: 100%;
background: #fff;
animation: pity-shimmer 0.6s ease infinite;
}

@keyframes pity-shimmer {
0%,100% { opacity: 1; }
50% { opacity: 0; }
}

/* COLLECTION LOG */
#collection-toggle {
font-family: ‘Press Start 2P’, monospace;
font-size: 8px;
background: none;
border: 2px solid #333;
color: #555;
padding: 10px 16px;
cursor: pointer;
margin-top: 28px;
transition: color 0.2s, border-color 0.2s;
}

#collection-toggle:hover { color: #aaa; border-color: #666; }

#collection-area {
display: none;
max-width: 700px;
width: 100%;
margin-top: 16px;
}

.collection-grid {
display: flex;
flex-wrap: wrap;
gap: 8px;
justify-content: center;
}

.coll-item {
width: 48px;
height: 60px;
border: 2px solid #333;
position: relative;
font-size: 6px;
overflow: hidden;
}

.coll-item canvas { width: 100%; height: 100%; display: block; }

.coll-count {
position: absolute;
bottom: 0;
right: 0;
background: rgba(0,0,0,0.8);
font-size: 5px;
padding: 1px 3px;
color: var(–gold);
}

/* TOOLTIP */
#tooltip {
position: fixed;
pointer-events: none;
z-index: 9000;
background: var(–panel);
border: 2px solid var(–border);
padding: 10px 12px;
font-size: 7px;
color: #ccc;
line-height: 1.8;
max-width: 180px;
display: none;
}

.tooltip-name { font-size: 8px; margin-bottom: 6px; }

/* OPENING ANIMATION */
#opening-overlay {
position: fixed;
inset: 0;
z-index: 500;
display: flex;
align-items: center;
justify-content: center;
pointer-events: none;
opacity: 0;
}

#opening-overlay.active { pointer-events: all; opacity: 1; }

.opening-block {
width: 180px;
height: 180px;
animation: opening-spin 0.6s cubic-bezier(0.68,-0.55,0.27,1.55) forwards;
}

@keyframes opening-spin {
0% { transform: scale(0.5) rotate(-180deg); opacity: 0; }
100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* Rarity banner */
#rarity-banner {
position: fixed;
top: 30%;
left: 50%;
transform: translateX(-50%) scale(0);
z-index: 600;
font-size: clamp(12px, 5vw, 22px);
letter-spacing: 6px;
text-align: center;
text-shadow: 0 0 30px currentColor;
transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
white-space: nowrap;
}

#rarity-banner.show { transform: translateX(-50%) scale(1); }

/* MOBILE */
@media (max-width: 480px) {
.pull-btn { font-size: 7px; padding: 12px 14px; }
#lucky-block { width: 96px; height: 96px; }
}
</style>

</head>
<body>

<canvas id="particle-canvas"></canvas>

<div id="flash"></div>
<div id="tooltip">
  <div class="tooltip-name" id="tt-name"></div>
  <div id="tt-rarity"></div>
  <div id="tt-desc"></div>
</div>

<div id="opening-overlay">
  <canvas class="opening-block" id="opening-canvas" width="180" height="180"></canvas>
</div>

<div id="rarity-banner"></div>

<div id="stars"></div>

<div id="app">
  <header>
    <div class="title-pixel">⭐ LUCKY PULL ⭐</div>
    <div class="subtitle">OPEN BLOCKS · COLLECT ITEMS · GO MYTHIC</div>
  </header>

  <div class="currency-bar">
    <span class="gem-icon">💎</span>
    <span id="coin-display">1000 GEMS</span>
    <span class="gem-icon">💎</span>
  </div>

  <div id="block-area">
    <div id="lucky-block" onclick="openBlock()" title="Click to open!">
      <canvas id="block-canvas" width="120" height="120"></canvas>
    </div>
  </div>

  <div class="btn-row">
    <button class="pull-btn btn-x1" onclick="doPull(1)">
      × 1 PULL
      <span class="btn-cost">10 💎</span>
    </button>
    <button class="pull-btn btn-x10" onclick="doPull(10)">
      × 10 PULL
      <span class="btn-cost">90 💎</span>
    </button>
    <button class="pull-btn btn-x100" onclick="doPull(100)">
      × 100 PULL
      <span class="btn-cost">800 💎</span>
    </button>
  </div>

  <div id="result-area">
    <div id="single-result">
      <div class="reveal-card" id="main-card">
        <canvas id="card-canvas" width="160" height="200"></canvas>
      </div>
      <div class="item-name" id="item-name-display"></div>
    </div>
    <div id="multi-result"></div>
  </div>

  <div id="pity-area">
    <div>LEGENDARY PITY: <span id="pity-count">0</span>/80</div>
    <div class="pity-bar-outer">
      <div class="pity-bar-inner" id="pity-bar" style="width:0%"></div>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat-item">
      <div class="stat-label">TOTAL PULLS</div>
      <div class="stat-val" id="stat-total">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">MYTHIC HITS</div>
      <div class="stat-val mythic" id="stat-mythic">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">LEGENDARY HITS</div>
      <div class="stat-val legendary" id="stat-legendary">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">EPIC HITS</div>
      <div class="stat-val epic" id="stat-epic">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">BEST PULL</div>
      <div class="stat-val" id="stat-best">—</div>
    </div>
  </div>

<button id="collection-toggle" onclick="toggleCollection()">▶ COLLECTION LOG</button>

  <div id="collection-area">
    <div class="collection-grid" id="coll-grid"></div>
  </div>
</div>

<script>
// ===================== DATA =====================

const RARITIES = {
  common:    { name: 'COMMON',    color: '#aaaaaa', chance: 0.58, multiplier: 1 },
  uncommon:  { name: 'UNCOMMON',  color: '#44ff88', chance: 0.25, multiplier: 2 },
  rare:      { name: 'RARE',      color: '#4488ff', chance: 0.10, multiplier: 5 },
  epic:      { name: 'EPIC',      color: '#cc44ff', chance: 0.05, multiplier: 10 },
  legendary: { name: 'LEGENDARY', color: '#ff8800', chance: 0.018, multiplier: 30 },
  mythic:    { name: 'MYTHIC',    color: '#ff2255', chance: 0.002, multiplier: 100 },
};

const ITEMS = [
  // Common
  { id:'c1', name:'Iron Sword', rarity:'common', desc:'A trusty blade', sprite: drawSword },
  { id:'c2', name:'Wooden Shield', rarity:'common', desc:'Splinter-free guarantee', sprite: drawShield },
  { id:'c3', name:'Health Potion', rarity:'common', desc:'+10 HP per sip', sprite: drawPotion },
  { id:'c4', name:'Rusty Coin', rarity:'common', desc:'Worth exactly 1 gem', sprite: drawCoin },
  { id:'c5', name:'Bread Loaf', rarity:'common', desc:'Delicious but useless', sprite: drawBread },
  // Uncommon
  { id:'u1', name:'Silver Bow', rarity:'uncommon', desc:'Arrows sold separately', sprite: drawBow },
  { id:'u2', name:'Magic Wand', rarity:'uncommon', desc:'Shoots sparks sometimes', sprite: drawWand },
  { id:'u3', name:'Steel Helmet', rarity:'uncommon', desc:'Reduces headaches', sprite: drawHelmet },
  { id:'u4', name:'Elixir Flask', rarity:'uncommon', desc:'Tastes like rainbows', sprite: drawElixir },
  // Rare
  { id:'r1', name:'Lightning Staff', rarity:'rare', desc:'Holds 3 charges', sprite: drawStaff },
  { id:'r2', name:'Shadow Cloak', rarity:'rare', desc:'Partial invisibility', sprite: drawCloak },
  { id:'r3', name:'Crystal Orb', rarity:'rare', desc:'Sees 5 seconds ahead', sprite: drawOrb },
  // Epic
  { id:'e1', name:'Void Blade', rarity:'epic', desc:'Cuts through reality', sprite: drawVoidBlade },
  { id:'e2', name:'Phoenix Wings', rarity:'epic', desc:'One-time revival', sprite: drawWings },
  // Legendary
  { id:'l1', name:'GALAXY HAMMER', rarity:'legendary', desc:'Forged in a dying star', sprite: drawHammer },
  { id:'l2', name:'ETERNAL FLAME', rarity:'legendary', desc:'Burns without fuel', sprite: drawFlame },
  // Mythic
  { id:'m1', name:'★ COSMOS BLADE ★', rarity:'mythic', desc:'The rarest of all pulls', sprite: drawCosmos },
  { id:'m2', name:'★ VOID CROWN ★', rarity:'mythic', desc:'Worn by gods alone', sprite: drawCrown },
];

// ===================== STATE =====================
let gems = 1000;
let pityCount = 0;
let stats = { total:0, mythic:0, legendary:0, epic:0 };
let bestRarity = null;
let collection = {};
let pulling = false;
const RARITY_ORDER = ['common','uncommon','rare','epic','legendary','mythic'];

// ===================== AUDIO =====================
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type='square', vol=0.15, delay=0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e){}
}

function playClick() { playTone(440, 0.06, 'square', 0.1); }

function playReveal(rarity) {
  const sounds = {
    common:    [[220,0.1],[330,0.1]],
    uncommon:  [[330,0.1],[440,0.15],[550,0.1]],
    rare:      [[440,0.12],[550,0.15],[660,0.2],[880,0.15]],
    epic:      [[330,0.1],[440,0.1],[550,0.1],[660,0.15],[880,0.25]],
    legendary: [[440,0.1],[550,0.1],[660,0.1],[880,0.2],[1100,0.2],[1320,0.3,,'sine']],
    mythic:    [[220,0.1],[330,0.1],[440,0.1],[660,0.15],[880,0.15],[1100,0.2],[1320,0.25],[1760,0.4,,'sine']],
  };
  const seq = sounds[rarity] || sounds.common;
  let t = 0;
  seq.forEach(([f,d,v,type]) => {
    playTone(f, d, type||'square', v||0.15, t);
    t += d * 0.9;
  });
}

function playOpenBlock() {
  [200,300,400,500,600].forEach((f,i) => playTone(f, 0.1, 'square', 0.1, i*0.04));
}

// ===================== PIXEL ART SPRITES =====================
function setPixel(ctx, x, y, color, scale=8) {
  ctx.fillStyle = color;
  ctx.fillRect(x*scale, y*scale, scale, scale);
}

function drawSprite(canvasEl, width, height, scale, drawFn) {
  const ctx = canvasEl.getContext('2d');
  ctx.clearRect(0,0,canvasEl.width, canvasEl.height);
  const px = (x,y,c) => setPixel(ctx,x,y,c,scale);
  drawFn(px, ctx, scale);
}

// --- Sprite functions (12x12 logical pixels, scale varies) ---
function drawSword(px){
  const d='#ccc', g='#888', h='#964B00';
  [[5,1,d],[6,1,d],[5,2,d],[6,2,d],[5,3,d],[5,4,d],[4,5,g],[5,5,g],[6,5,g],[7,5,g],[5,6,d],[5,7,d],[5,8,d],[5,9,h],[5,10,h]].forEach(([x,y,c])=>px(x,y,c));
}
function drawShield(px){
  const b='#4488ff', s='#224499', e='#88aaff';
  [[3,1,b],[4,1,b],[5,1,b],[6,1,b],[7,1,b],[2,2,b],[3,2,s],[4,2,s],[5,2,e],[6,2,s],[7,2,s],[8,2,b],[2,3,b],[3,3,s],[5,3,b],[7,3,s],[8,3,b],[2,4,b],[3,4,b],[5,4,b],[7,4,b],[8,4,b],[3,5,b],[4,5,b],[5,5,b],[6,5,b],[7,5,b],[4,6,b],[5,6,b],[6,6,b],[5,7,b]].forEach(([x,y,c])=>px(x,y,c));
}
function drawPotion(px){
  const r='#ff4444', g='#ff8888', b='#cc0000';
  [[4,0,'#888'],[5,0,'#888'],[4,1,'#aaa'],[5,1,'#aaa'],[3,2,r],[4,2,r],[5,2,r],[6,2,r],[2,3,r],[3,3,g],[4,3,g],[5,3,r],[6,3,r],[7,3,r],[2,4,r],[3,4,g],[4,4,g],[5,4,g],[6,4,r],[7,4,r],[2,5,r],[3,5,r],[4,5,g],[5,5,r],[6,5,r],[7,5,r],[3,6,b],[4,6,b],[5,6,b],[6,6,b],[4,7,b],[5,7,b]].forEach(([x,y,c])=>px(x,y,c));
}

// Lucky block sprite
function drawLuckyBlock(canvasEl, shine=0) {
  const ctx = canvasEl.getContext('2d');
  const s = 10;
  ctx.clearRect(0,0,canvasEl.width, canvasEl.height);
  const px = (x,y,c) => { ctx.fillStyle=c; ctx.fillRect(x*s,y*s,s,s); };
  const g='#ffd700', d='#cc9900', l='#ffee88', b='#000', q='#ffcc00';
  // Block body
  for(let x=1;x<=10;x++) for(let y=1;y<=10;y++) px(x,y,g);
  // Shading top
  for(let x=1;x<=10;x++) px(x,1,l);
  for(let x=1;x<=10;x++) px(x,2,l);
  // Shading left
  for(let y=1;y<=10;y++) px(1,y,l);
  for(let y=1;y<=10;y++) px(2,y,l);
  // Shading bottom/right
  for(let x=1;x<=10;x++) px(x,10,d);
  for(let y=1;y<=10;y++) px(10,y,d);
  // Question mark
  [[4,3,b],[5,3,b],[6,3,b],[7,3,b],[3,4,b],[8,4,b],[7,5,b],[6,6,b],[6,7,b],[6,9,b],[6,10,b]].forEach(([x,y,c])=>{
    if(y>=1 && y<=10 && x>=1 && x<=10) px(x,y,b);
  });
  // ? mark pixel art
  ctx.fillStyle = b;
  [[4,3],[5,3],[6,3],[7,3],[3,4],[8,4],[7,5],[6,6],[6,7],[6,9]].forEach(([x,y])=>{ ctx.fillRect(x*s,y*s,s,s); });
  // Shine overlay
  if(shine > 0) {
    ctx.fillStyle = `rgba(255,255,255,${shine})`;
    ctx.fillRect(0,0,canvasEl.width, canvasEl.height);
  }
}

// ===================== PULL LOGIC =====================
function rollRarity(pity) {
  // Hard pity at 80
  if(pity >= 80) return 'legendary';
  let r = Math.random();
  // Soft pity: boost legendary chance after 60
  let legendaryBoost = pity > 60 ? (pity-60)*0.02 : 0;
  if(r < 0.002) return 'mythic';
  r -= 0.002;
  if(r < 0.018 + legendaryBoost) return 'legendary';
  r -= 0.018 + legendaryBoost;
  if(r < 0.05) return 'epic';
  r -= 0.05;
  if(r < 0.10) return 'rare';
  r -= 0.10;
  if(r < 0.25) return 'uncommon';
  return 'common';
}

function pickItem(rarity) {
  const pool = ITEMS.filter(i=>i.rarity===rarity);
  return pool[Math.floor(Math.random()*pool.length)];
}

function doPull(count) {
  if(pulling) return;
  const costs = {1:10, 10:90, 100:800};
  const cost = costs[count];
  if(gems < cost) {
    showFlash('#ff4444');
    playTone(150, 0.3, 'sawtooth', 0.1);
    return;
  }
  gems -= cost;
  updateGems();
  pulling = true;
  playClick();

  if(count === 1) {
    doSinglePull();
  } else {
    doMultiPull(count);
  }
}

function doSinglePull() {
  // Animate block
  const block = document.getElementById('lucky-block');
  block.classList.remove('shaking');
  void block.offsetWidth;
  block.classList.add('shaking');
  playOpenBlock();

  setTimeout(() => {
    pityCount++;
    if(['legendary','mythic'].includes(rollRarity(0))) pityCount = 0;
    const rarity = rollRarity(pityCount);
    if(rarity==='legendary'||rarity==='mythic') pityCount=0;
    else pityCount++;
    const item = pickItem(rarity);
    updateStats(rarity, item);
    updatePity();
    showSingleResult(item);
  }, 550);
}

function doMultiPull(count) {
  const block = document.getElementById('lucky-block');
  block.classList.remove('shaking');
  void block.offsetWidth;
  block.classList.add('shaking');
  playOpenBlock();

  setTimeout(() => {
    const results = [];
    for(let i=0;i<count;i++){
      pityCount++;
      const rarity = rollRarity(pityCount);
      if(rarity==='legendary'||rarity==='mythic') pityCount=0;
      const item = pickItem(rarity);
      results.push(item);
      updateStats(rarity, item);
    }
    updatePity();
    showMultiResult(results);
  }, 600);
}

// ===================== DISPLAY =====================
function showSingleResult(item) {
  const sr = document.getElementById('single-result');
  const mr = document.getElementById('multi-result');
  sr.style.display = 'flex';
  mr.style.display = 'none';

  // Draw on card canvas
  const canvas = document.getElementById('card-canvas');
  drawItemOnCanvas(canvas, item, 160, 200);

  const card = document.getElementById('main-card');
  card.className = `reveal-card rarity-${item.rarity}`;

  // Animate card
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'card-appear 0.4s cubic-bezier(0.34,1.56,0.64,1)';

  document.getElementById('item-name-display').textContent = item.name;
  document.getElementById('item-name-display').style.color = RARITIES[item.rarity].color;

  // FX
  playReveal(item.rarity);
  setTimeout(()=>{
    spawnParticles(item.rarity, window.innerWidth/2, window.innerHeight/2);
    if(['legendary','mythic'].includes(item.rarity)) {
      showFlash(RARITIES[item.rarity].color);
      screenShake(item.rarity==='mythic' ? 20 : 12, 600);
      showRarityBanner(item.rarity);
    } else if(item.rarity==='epic') {
      showFlash(RARITIES[item.rarity].color, 0.3);
      screenShake(6, 300);
    }
    pulling = false;
  }, 200);

  addToCollection(item);
}

function showMultiResult(results) {
  const sr = document.getElementById('single-result');
  const mr = document.getElementById('multi-result');
  sr.style.display = 'none';
  mr.style.display = 'flex';
  mr.innerHTML = '';

  // Find best
  let bestIdx = 0;
  let bestRarityIdx = 0;
  results.forEach((item,i) => {
    const ri = RARITY_ORDER.indexOf(item.rarity);
    if(ri > bestRarityIdx) { bestRarityIdx=ri; bestIdx=i; }
  });

  results.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = `mini-card rarity-${item.rarity}`;
    card.style.animationDelay = `${i*0.03}s`;

    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 80;
    drawItemOnCanvas(canvas, item, 64, 80);
    card.appendChild(canvas);
    mr.appendChild(card);

    card.addEventListener('mouseenter', (e) => showTooltip(e, item));
    card.addEventListener('mouseleave', hideTooltip);
    card.addEventListener('touchstart', (e) => showTooltip(e, item), {passive:true});

    addToCollection(item);
  });

  // FX for best pull
  setTimeout(() => {
    const bestRar = results[bestIdx].rarity;
    playReveal(bestRar);
    const bcard = mr.children[bestIdx];
    if(bcard) {
      const rect = bcard.getBoundingClientRect();
      spawnParticles(bestRar, rect.left + rect.width/2, rect.top + rect.height/2);
    }
    if(['legendary','mythic'].includes(bestRar)) {
      showFlash(RARITIES[bestRar].color);
      screenShake(bestRar==='mythic'?18:10, 500);
      showRarityBanner(bestRar);
    }

    // Cascade mini particles
    results.forEach((item,i) => {
      if(['epic','legendary','mythic'].includes(item.rarity)) {
        setTimeout(() => {
          const c = mr.children[i];
          if(c) {
            const r = c.getBoundingClientRect();
            spawnParticles(item.rarity, r.left+r.width/2, r.top+r.height/2, 8);
          }
        }, i*40+300);
      }
    });

    pulling = false;
  }, 400);
}

function drawItemOnCanvas(canvas, item, w, h) {
  const ctx = canvas.getContext('2d');
  const rColor = RARITIES[item.rarity].color;
  // Background gradient
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, '#1a1a2a');
  grad.addColorStop(1, '#0a0a12');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  // Rarity shine strip at top
  ctx.fillStyle = rColor;
  ctx.fillRect(0, 0, w, 4);
  ctx.fillRect(0, h-4, w, 4);

  // Draw sprite centered
  const spriteScale = Math.min(w,h) > 100 ? 9 : 4;
  const spriteSize = 12 * spriteScale;
  const sx = Math.floor((w - spriteSize) / 2);
  const sy = Math.floor((h - spriteSize) / 2) - 6;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = spriteSize; tempCanvas.height = spriteSize;
  const px = (x,y,c) => {
    const tc = tempCanvas.getContext('2d');
    tc.fillStyle=c; tc.fillRect(x*spriteScale,y*spriteScale,spriteScale,spriteScale);
  };
  item.sprite(px);
  ctx.drawImage(tempCanvas, sx, sy);

  // Rarity text at bottom
  ctx.fillStyle = rColor;
  ctx.font = `${Math.max(5, Math.floor(w/22))}px 'Press Start 2P', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(RARITIES[item.rarity].name, w/2, h - 10);
}

function updateStats(rarity, item) {
  stats.total++;
  if(rarity==='mythic') stats.mythic++;
  if(rarity==='legendary') stats.legendary++;
  if(rarity==='epic') stats.epic++;

  const curBestIdx = bestRarity ? RARITY_ORDER.indexOf(bestRarity) : -1;
  const newIdx = RARITY_ORDER.indexOf(rarity);
  if(newIdx > curBestIdx) bestRarity = rarity;

  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-mythic').textContent = stats.mythic;
  document.getElementById('stat-legendary').textContent = stats.legendary;
  document.getElementById('stat-epic').textContent = stats.epic;
  const bestEl = document.getElementById('stat-best');
  if(bestRarity) {
    bestEl.textContent = RARITIES[bestRarity].name;
    bestEl.style.color = RARITIES[bestRarity].color;
    bestEl.style.textShadow = `0 0 10px ${RARITIES[bestRarity].color}`;
  }
}

function updateGems() {
  document.getElementById('coin-display').textContent = `${gems} GEMS`;
  // Award gems over time
}

function updatePity() {
  document.getElementById('pity-count').textContent = Math.min(pityCount, 80);
  const pct = Math.min(pityCount/80*100, 100);
  document.getElementById('pity-bar').style.width = pct + '%';
}

function addToCollection(item) {
  collection[item.id] = (collection[item.id]||0) + 1;
  refreshCollection();
}

function refreshCollection() {
  const grid = document.getElementById('coll-grid');
  grid.innerHTML = '';
  Object.entries(collection).sort((a,b)=>{
    const ia = ITEMS.find(i=>i.id===a[0]);
    const ib = ITEMS.find(i=>i.id===b[0]);
    return RARITY_ORDER.indexOf(ib.rarity) - RARITY_ORDER.indexOf(ia.rarity);
  }).forEach(([id, count]) => {
    const item = ITEMS.find(i=>i.id===id);
    if(!item) return;
    const el = document.createElement('div');
    el.className = `coll-item rarity-${item.rarity}`;

    const canvas = document.createElement('canvas');
    canvas.width=48; canvas.height=60;
    drawItemOnCanvas(canvas, item, 48, 60);
    el.appendChild(canvas);

    if(count > 1) {
      const cnt = document.createElement('div');
      cnt.className='coll-count';
      cnt.textContent = 'x'+count;
      el.appendChild(cnt);
    }

    el.addEventListener('mouseenter', (e)=>showTooltip(e,item));
    el.addEventListener('mouseleave', hideTooltip);
    grid.appendChild(el);
  });
}

function toggleCollection() {
  collectionOpen = !collectionOpen;
  const area = document.getElementById('collection-area');
  const btn = document.getElementById('collection-toggle');
  area.style.display = collectionOpen ? 'block' : 'none';
  btn.textContent = (collectionOpen ? '▼' : '▶') + ' COLLECTION LOG';
}

// ===================== TOOLTIPS =====================
function showTooltip(e, item) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent = item.name;
  document.getElementById('tt-name').style.color = RARITIES[item.rarity].color;
  document.getElementById('tt-rarity').textContent = RARITIES[item.rarity].name;
  document.getElementById('tt-rarity').style.color = RARITIES[item.rarity].color;
  document.getElementById('tt-desc').textContent = item.desc;
  tt.style.display = 'block';
  moveTT(e);
}

function moveTT(e) {
  const tt = document.getElementById('tooltip');
  const x = (e.clientX||e.touches?.[0]?.clientX||0) + 12;
  const y = (e.clientY||e.touches?.[0]?.clientY||0) + 12;
  tt.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  tt.style.top = Math.min(y, window.innerHeight - 120) + 'px';
}

document.addEventListener('mousemove', e => {
  if(document.getElementById('tooltip').style.display==='block') moveTT(e);
});

function hideTooltip() {
  document.getElementById('tooltip').style.display='none';
}

// ===================== PARTICLES =====================
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticleCanvas() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeParticleCanvas);
resizeParticleCanvas();

const RARITY_COLORS_LIST = {
  common:    ['#aaa','#ccc','#fff'],
  uncommon:  ['#44ff88','#88ffaa','#aaffcc'],
  rare:      ['#4488ff','#88aaff','#aaccff'],
  epic:      ['#cc44ff','#ee88ff','#cc88ff'],
  legendary: ['#ff8800','#ffaa44','#ffd700','#ffcc00'],
  mythic:    ['#ff2255','#ff4488','#ff00ff','#ff8800','#ffcc00','#ffffff'],
};

function spawnParticles(rarity, cx, cy, count=null) {
  const counts = {common:15, uncommon:25, rare:35, epic:50, legendary:80, mythic:120};
  const n = count || counts[rarity] || 20;
  const colors = RARITY_COLORS_LIST[rarity];

  for(let i=0;i<n;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2 + Math.random()*8;
    const size = 3 + Math.random()*8;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - Math.random()*4,
      size,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1,
      decay: 0.012 + Math.random()*0.02,
      gravity: 0.2,
      type: Math.random()<0.3 ? 'star' : 'square',
    });
  }
}

function drawStar5(ctx, cx, cy, r) {
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a1 = (i*2*Math.PI/5) - Math.PI/2;
    const a2 = a1 + Math.PI/5;
    const x1=cx+Math.cos(a1)*r, y1=cy+Math.sin(a1)*r;
    const x2=cx+Math.cos(a2)*(r*0.4), y2=cy+Math.sin(a2)*(r*0.4);
    i===0 ? ctx.moveTo(x1,y1) : ctx.lineTo(x1,y1);
    ctx.lineTo(x2,y2);
  }
  ctx.closePath();
  ctx.fill();
}

function updateParticles() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.98;
    p.life -= p.decay;

    pCtx.globalAlpha = Math.max(0, p.life);
    pCtx.fillStyle = p.color;

    if(p.type==='star') {
      drawStar5(pCtx, p.x, p.y, p.size);
    } else {
      pCtx.fillRect(p.x, p.y, p.size, p.size);
    }
  });
  pCtx.globalAlpha = 1;
  requestAnimationFrame(updateParticles);
}
updateParticles();

// ===================== SCREEN EFFECTS =====================
function showFlash(color, intensity=0.6) {
  const flash = document.getElementById('flash');
  flash.style.background = color;
  flash.style.opacity = intensity;
  setTimeout(()=>{ flash.style.opacity=0; }, 80);
  setTimeout(()=>{ flash.style.opacity=intensity*0.5; }, 120);
  setTimeout(()=>{ flash.style.opacity=0; }, 200);
}

let shakeX=0, shakeY=0;
function screenShake(intensity=10, duration=400) {
  const appEl = document.getElementById('app');
  const start = Date.now();
  function doShake() {
    const elapsed = Date.now()-start;
    if(elapsed > duration) { appEl.style.transform=''; return; }
    const progress = elapsed/duration;
    const mag = intensity*(1-progress);
    const x = (Math.random()-0.5)*mag;
    const y = (Math.random()-0.5)*mag;
    appEl.style.transform = `translate(${x}px,${y}px)`;
    requestAnimationFrame(doShake);
  }
  doShake();
}

function showRarityBanner(rarity) {
  const banner = document.getElementById('rarity-banner');
  banner.textContent = `✦ ${RARITIES[rarity].name} ✦`;
  banner.style.color = RARITIES[rarity].color;
  banner.style.textShadow = `0 0 30px ${RARITIES[rarity].color}, 0 0 60px ${RARITIES[rarity].color}`;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 2200);
}

// ===================== BLOCK ANIMATION =====================
let blockShine = 0;
let blockShineDir = 1;
let blockFrame = 0;

function openBlock() {
  if(pulling) return;
  playClick();
  const block = document.getElementById('lucky-block');
  block.classList.remove('shaking');
  void block.offsetWidth;
  block.classList.add('shaking');
}

function animateBlock() {
  blockFrame++;
  blockShine += blockShineDir * 0.01;
  if(blockShine > 0.15) blockShineDir = -1;
  if(blockShine < 0) { blockShineDir = 1; blockShine = 0; }

  const canvas = document.getElementById('block-canvas');
  if(canvas) drawLuckyBlock(canvas, blockShine);
  requestAnimationFrame(animateBlock);
}
animateBlock();

  const container = document.getElementById('stars');
  for(let i=0;i<80;i++){

}
